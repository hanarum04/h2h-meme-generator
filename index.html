<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts2Hearts Face Booth</title>
<style>
  @font-face {
    font-family: 'DynaPuff';
    src: url('resources/DynaPuff/DynaPuff-VariableFont_wdth,wght.ttf') format('truetype');
    font-weight: 100 900;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grad-top:    #8ecae6;
    --grad-bottom: #76c442;
    --win-bg:       #ffffff;
    --win-border:   rgba(0,0,0,0.14);
    --titlebar-bg:  #ececec;
    --titlebar-border: rgba(0,0,0,0.1);
    --toolbar-bg:   #f5f5f5;
    --toolbar-border: rgba(0,0,0,0.08);
    --win-shadow:   0 24px 64px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.1);
    --dot-r: #ff5f57;
    --dot-y: #febc2e;
    --dot-g: #28c840;
    --accent: #e8413a;
    --text-mid: #555;
    --text-light: #aaa;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--grad-top) 0%, var(--grad-bottom) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Ornaments ── */
  .ornament {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .ornament img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .orn-topleft  { width: 200px; top: 16px;    left: 32px;   animation: float 4.2s ease-in-out infinite; }
  .orn-topright { width: 180px; top: 8px;     right: 28px;  animation: float 3.8s ease-in-out infinite; animation-delay: -1.1s; }
  .orn-midleft  { width: 230px; top: 50%;     left: 0;      animation: floatMid 4.6s ease-in-out infinite; animation-delay: -0.6s; }
  .orn-midright { width: 250px; top: 40%;     right: -16px; animation: float 3.5s ease-in-out infinite; animation-delay: -1.8s; }
  .orn-botright { width: 190px; bottom: 16px; right: 28px;  animation: float 4.1s ease-in-out infinite; animation-delay: -0.3s; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-16px); }
  }
  @keyframes floatMid {
    0%,100% { transform: translateY(-50%); }
    50%      { transform: translateY(calc(-50% - 16px)); }
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 44px 20px 24px;
  }
  header h1 {
    font-family: 'DynaPuff', cursive;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700;
    color: white;
    text-shadow: 0 2px 16px rgba(0,0,0,0.1);
  }

  /* ── Status pill ── */
  #status-bar {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.32);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    color: rgba(0,0,0,0.55);
    margin-top: 12px;
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #bbb; flex-shrink: 0; transition: background 0.3s;
  }
  #status-dot.ready   { background: #28c840; box-shadow: 0 0 5px #28c840; }
  #status-dot.loading { background: #febc2e; animation: pulse 1s infinite; }
  #status-dot.detected{ background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Stage ── */
  .stage {
    position: relative;
    z-index: 10;
    padding: 0 24px 64px;
    display: flex;
    justify-content: center;
  }

  /* ── Single mac window ── */
  .mac-window {
    background: var(--win-bg);
    border: 1px solid var(--win-border);
    border-radius: var(--radius);
    box-shadow: var(--win-shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    width: min(640px, 92vw);
  }

  /* ── Title bar ── */
  .titlebar {
    height: 28px;
    background: var(--titlebar-bg);
    border-bottom: 1px solid var(--titlebar-border);
    display: flex; align-items: center;
    padding: 0 10px; gap: 6px;
    flex-shrink: 0; position: relative;
  }
  .titlebar-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .titlebar-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--text-mid); font-weight: 500; white-space: nowrap;
  }

  /* ── Main content area ── */
  .booth-body {
    flex: 1;
    position: relative;
    min-height: 420px;
    background: #fff;
    overflow: hidden;
  }

  /* Meme fills the whole body */
  #meme-display {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  .meme-placeholder-icon { font-size: 52px; opacity: 0.1; }
  .meme-placeholder-text { font-size: 13px; color: var(--text-light); text-align: center; line-height: 1.6; }

  #meme-img {
    max-width: 55%;
    max-height: 380px;
    object-fit: contain;
    display: none;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: absolute;
    left: 24px; top: 50%; transform: translateY(-50%);
  }
  @keyframes popIn {
    from { transform: translateY(-50%) scale(0.75); opacity: 0; }
    to   { transform: translateY(-50%) scale(1);    opacity: 1; }
  }

  /* ── Camera inset — bottom right ── */
  .cam-inset {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 220px; height: 165px;
    border-radius: 6px;
    overflow: hidden;
    background: #e0e0e0;
    border: 1px solid rgba(0,0,0,0.12);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }

  #webcam {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    transform: scaleX(-1);
  }
  #cam-overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #cam-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    color: #bbb; font-size: 11px; text-align: center;
  }
  .start-btn {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; border: none;
    border-radius: 999px; padding: 5px 14px;
    font-size: 10px; cursor: pointer; white-space: nowrap;
    font-family: -apple-system, sans-serif;
  }
  .start-btn:hover { opacity: 0.88; }

  /* expr tag in camera corner */
  #expr-tag {
    position: absolute; top: 5px; left: 5px;
    background: rgba(232,65,58,0.88);
    color: white; font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 3px; display: none;
  }

  /* ── Countdown overlay ── */
  #countdown-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center; justify-content: center;
    z-index: 20;
    border-radius: var(--radius);
  }
  #countdown-overlay.visible { display: flex; }

  #countdown-number {
    font-family: 'DynaPuff', cursive;
    font-size: 120px;
    color: white;
    text-shadow: 0 4px 32px rgba(0,0,0,0.4);
    animation: countPop 0.9s ease-out forwards;
    line-height: 1;
  }
  @keyframes countPop {
    0%   { transform: scale(1.4); opacity: 0; }
    20%  { transform: scale(1);   opacity: 1; }
    80%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(0.8); opacity: 0; }
  }

  /* Flash effect on capture */
  #flash {
    position: absolute; inset: 0;
    background: white; opacity: 0;
    pointer-events: none; z-index: 30;
    border-radius: var(--radius);
    transition: opacity 0.08s;
  }
  #flash.pop { opacity: 1; }

  /* ── Toolbar ── */
  .toolbar {
    height: 50px;
    background: var(--toolbar-bg);
    border-top: 1px solid var(--toolbar-border);
    display: flex; align-items: center;
    justify-content: center;
    padding: 0 14px; gap: 10px;
    flex-shrink: 0; position: relative;
  }
  .toolbar-left {
    position: absolute; left: 14px;
    display: flex; gap: 6px; align-items: center;
  }
  .toolbar-right {
    position: absolute; right: 14px;
  }

  .view-btn {
    width: 26px; height: 20px; border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.18); background: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .view-btn:hover { background: #e8e8e8; }
  .view-btn.active { background: #4a8eff; border-color: #3a7aee; }

  .capture-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
    box-shadow: 0 2px 8px rgba(232,65,58,0.38);
    transition: transform 0.15s;
  }
  .capture-btn:hover  { transform: scale(1.08); }
  .capture-btn:active { transform: scale(0.95); }

  .effects-btn {
    font-size: 11px; color: var(--text-mid);
    padding: 3px 10px; background: white;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px; cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

  #capture-canvas { display: none; }
</style>
</head>
<body>

<!-- Ornaments -->
<div class="ornament orn-topleft"><img src="resources/pinkhearts.png" alt=""></div>
<div class="ornament orn-topright"><img src="resources/pinkhearts_right.png" alt=""></div>
<div class="ornament orn-midleft"><img src="resources/yellowhearts.png" alt=""></div>
<div class="ornament orn-midright"><img src="resources/whitehearts2.png" alt=""></div>
<div class="ornament orn-botright"><img src="resources/whitehearts.png" alt=""></div>

<!-- Header -->
<header>
  <h1>Hearts2Hearts</h1>
  <div id="status-bar">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">Loading models…</span>
  </div>
</header>

<!-- Stage: single window -->
<div class="stage">
  <div class="mac-window" id="mac-window">

    <!-- Title bar -->
    <div class="titlebar">
      <div class="titlebar-dot" style="background:var(--dot-r)"></div>
      <div class="titlebar-dot" style="background:var(--dot-y)"></div>
      <div class="titlebar-dot" style="background:var(--dot-g)"></div>
      <span class="titlebar-title">Photo Booth</span>
    </div>

    <!-- Main body -->
    <div class="booth-body" id="booth-body">

      <!-- Meme area (left/center) -->
      <div id="meme-display">
        <div class="meme-placeholder-icon">🤘</div>
        <div class="meme-placeholder-text">Enable camera &amp; strike a pose!</div>
      </div>
      <img id="meme-img" src="" alt="H2H meme" />

      <!-- Camera inset — bottom right -->
      <div class="cam-inset">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="cam-overlay"></canvas>
        <div id="cam-placeholder">
          <svg width="28" height="22" viewBox="0 0 36 28" fill="none">
            <rect x="1" y="5" width="34" height="22" rx="3" stroke="#bbb" stroke-width="2"/>
            <circle cx="18" cy="16" r="7" stroke="#bbb" stroke-width="2"/>
            <circle cx="18" cy="16" r="3" fill="#bbb" opacity="0.4"/>
            <path d="M13 5L15 1h6l2 4" stroke="#bbb" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <span>Camera off</span>
          <button class="start-btn" id="start-btn" onclick="startCamera()">Enable Camera</button>
        </div>
        <div id="expr-tag"></div>
      </div>

      <!-- Countdown overlay (covers whole booth body) -->
      <div id="countdown-overlay">
        <div id="countdown-number"></div>
      </div>

      <!-- Flash -->
      <div id="flash"></div>

    </div><!-- /booth-body -->

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="view-btn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <rect x="1" y="1" width="4.5" height="4.5" rx="0.8" stroke="#666" stroke-width="1.1"/>
            <rect x="7.5" y="1" width="4.5" height="4.5" rx="0.8" stroke="#666" stroke-width="1.1"/>
            <rect x="1" y="7.5" width="4.5" height="4.5" rx="0.8" stroke="#666" stroke-width="1.1"/>
            <rect x="7.5" y="7.5" width="4.5" height="4.5" rx="0.8" stroke="#666" stroke-width="1.1"/>
          </svg>
        </div>
        <div class="view-btn active">
          <svg width="13" height="9" viewBox="0 0 13 9" fill="none">
            <rect x="1" y="1" width="11" height="7" rx="0.8" stroke="white" stroke-width="1.1"/>
          </svg>
        </div>
      </div>
      <button class="capture-btn" onclick="manualCapture()">
        <svg width="15" height="13" viewBox="0 0 16 14" fill="white">
          <path d="M6 1L5 3H2a1 1 0 00-1 1v8a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1h-3L10 1H6zm2 9a3 3 0 110-6 3 3 0 010 6z"/>
        </svg>
      </button>
      <div class="toolbar-right">
        <span class="effects-btn">Effects</span>
      </div>
    </div>

  </div><!-- /mac-window -->
</div><!-- /stage -->

<canvas id="capture-canvas"></canvas>

<script type="module">

// ── MEME CONFIG ──────────────────────────────
const MEMES = {
  metal:          { label: 'Metal 🤘',   src: 'memes/metal.jpg' },
  shocked:        { label: 'Shocked 🤭', src: 'memes/shocked.jpg' },
  indexfinger:    { label: 'Shhh ☝️',   src: 'memes/indexfinger.jpg' },
  dies:           { label: 'Dying 💀',   src: 'memes/dies.jpg' },
  upsidedownpeace:{ label: 'Peace ✌️',  src: 'memes/upsidedownpeace.jpg' },
  neutral:        { label: 'Neutral 😐', src: 'memes/neutral.jpg' },
};

// ── COUNTDOWN CONFIG ─────────────────────────
const COUNTDOWN_SEC   = 3;   // seconds before photo is taken
const GESTURE_HOLD_MS = 800; // ms a gesture must be stable before countdown starts

// ── STATE ────────────────────────────────────
let faceLandmarker = null, handLandmarker = null;
let lastGesture      = null;
let candidateGesture = null, candidateCount = 0;
let videoReady       = false;

// Countdown state
let countdownActive  = false;
let countdownTimer   = null;   // setInterval handle
let gestureStableAt  = null;   // timestamp when current gesture first locked in
let currentGesture   = null;   // the gesture that's currently showing

const video   = document.getElementById('webcam');
const overlay = document.getElementById('cam-overlay');
const ctx     = overlay.getContext('2d');

const HOLD_FRAMES = 6; // detection smoothing frames

// ── STATUS ───────────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-dot').className = state;
  document.getElementById('status-text').textContent = text;
}

// ── LOAD MODELS ──────────────────────────────
async function loadModels() {
  setStatus('loading', 'Loading hand + face models…');
  try {
    const { FaceLandmarker, HandLandmarker, FilesetResolver } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs'
    );
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
    );
    [faceLandmarker, handLandmarker] = await Promise.all([
      FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task', delegate: 'GPU' },
        runningMode: 'VIDEO', numFaces: 1,
      }),
      HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'GPU' },
        runningMode: 'VIDEO', numHands: 2,
      }),
    ]);
    setStatus('ready', 'Ready — enable camera and strike a pose!');
  } catch (err) { setStatus('loading', 'Error: ' + err.message); }
}

// ── CAMERA ───────────────────────────────────
window.startCamera = async function() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('cam-placeholder').style.display = 'none';
    video.addEventListener('loadeddata', () => {
      videoReady = true;
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
      setStatus('ready', 'Camera active — strike a pose!');
      detectLoop();
    });
  } catch (err) { alert('Could not access camera: ' + err.message); }
};

// ── DETECTION LOOP ────────────────────────────
function detectLoop() {
  if (!videoReady || !faceLandmarker || !handLandmarker) { requestAnimationFrame(detectLoop); return; }
  if (countdownActive) { requestAnimationFrame(detectLoop); return; } // freeze detection during countdown

  const now = performance.now();
  const faceResult = faceLandmarker.detectForVideo(video, now);
  const handResult = handLandmarker.detectForVideo(video, now);

  ctx.clearRect(0, 0, overlay.width, overlay.height);
  const faceLMs = faceResult.faceLandmarks?.[0] ?? null;
  const hands   = handResult.landmarks ?? [];
  if (faceLMs) drawFaceBox(faceLMs);
  hands.forEach(h => drawHandDots(h));

  const raw = classifyGesture(hands, faceLMs);

  // Smooth the gesture signal
  if (raw === candidateGesture) {
    candidateCount++;
  } else {
    candidateGesture = raw;
    candidateCount   = 1;
    // If gesture changed, reset the stable timer — restart countdown
    if (raw !== currentGesture) {
      gestureStableAt = null;
      cancelCountdown();
    }
  }

  if (candidateCount >= HOLD_FRAMES) {
    // Gesture is confirmed stable
    if (raw !== currentGesture) {
      currentGesture  = raw;
      gestureStableAt = performance.now();
      updateMeme(raw);
    }

    // Only start countdown for non-neutral gestures
    if (raw !== 'neutral' && !countdownActive && gestureStableAt !== null) {
      const heldFor = performance.now() - gestureStableAt;
      if (heldFor >= GESTURE_HOLD_MS) {
        startCountdown();
      }
    }
  }

  requestAnimationFrame(detectLoop);
}

// ── COUNTDOWN ────────────────────────────────
function startCountdown() {
  countdownActive = true;
  let count = COUNTDOWN_SEC;
  const overlay_el = document.getElementById('countdown-overlay');
  const num_el     = document.getElementById('countdown-number');

  function tick() {
    if (count <= 0) {
      clearInterval(countdownTimer);
      overlay_el.classList.remove('visible');
      countdownActive = false;
      // Reset so another pose can trigger again
      gestureStableAt = null;
      captureBoothFrame();
      return;
    }
    num_el.textContent = count;
    // Re-trigger animation each tick
    num_el.style.animation = 'none';
    void num_el.offsetWidth;
    num_el.style.animation = '';
    overlay_el.classList.add('visible');
    count--;
  }

  tick(); // show "3" immediately
  countdownTimer = setInterval(tick, 1000);
}

function cancelCountdown() {
  if (!countdownActive) return;
  clearInterval(countdownTimer);
  countdownActive = false;
  document.getElementById('countdown-overlay').classList.remove('visible');
  setStatus('ready', 'Gesture changed — try again!');
}

// ── CAPTURE THE WHOLE BOOTH ──────────────────
// Uses html2canvas to screenshot the whole mac window including frame + meme + camera
async function captureBoothFrame() {
  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.add('pop');
  setTimeout(() => flash.classList.remove('pop'), 180);

  // We draw everything onto a canvas manually:
  // 1. The meme image
  // 2. The live camera frame (mirrored)
  // We composite them into a canvas that matches the booth body dimensions

  const boothBody = document.getElementById('booth-body');
  const bw = boothBody.offsetWidth;
  const bh = boothBody.offsetHeight;

  const c  = document.getElementById('capture-canvas');
  c.width  = bw;
  c.height = bh;
  const cx = c.getContext('2d');

  // White background
  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, bw, bh);

  // Draw meme image if visible
  const memeImg = document.getElementById('meme-img');
  if (memeImg.style.display !== 'none' && memeImg.src) {
    // Match its rendered position
    const mr = memeImg.getBoundingClientRect();
    const br = boothBody.getBoundingClientRect();
    cx.drawImage(memeImg, mr.left - br.left, mr.top - br.top, mr.width, mr.height);
  }

  // Draw camera (mirrored) into its inset position
  const camInset = document.querySelector('.cam-inset');
  const cr = camInset.getBoundingClientRect();
  const br2 = boothBody.getBoundingClientRect();
  const cx2 = cr.left - br2.left;
  const cy2 = cr.top  - br2.top;
  const cw  = cr.width;
  const ch  = cr.height;

  if (videoReady && video.readyState >= 2) {
    cx.save();
    cx.translate(cx2 + cw, cy2); // flip horizontally
    cx.scale(-1, 1);
    cx.drawImage(video, 0, 0, cw, ch);
    cx.restore();
  }

  // Download
  const link = document.createElement('a');
  link.download = 'h2h-' + Date.now() + '.png';
  link.href = c.toDataURL('image/png');
  link.click();

  // Re-enable detection after short pause
  setTimeout(() => {
    currentGesture  = null;
    candidateGesture = null;
    candidateCount   = 0;
    setStatus('ready', 'Camera active — strike a pose!');
  }, 1500);
}

// Manual capture button (no countdown)
window.manualCapture = function() {
  captureBoothFrame();
};

// ── GESTURE CLASSIFIER ───────────────────────
function classifyGesture(hands, faceLMs) {
  if (hands.length === 0) return 'neutral';
  const mouth = faceLMs ? faceLMs[13]  : null;
  const chin  = faceLMs ? faceLMs[152] : null;

  function fingers(hand) {
    return {
      indexUp:  hand[8].y  < hand[5].y,
      middleUp: hand[12].y < hand[9].y,
      ringUp:   hand[16].y < hand[13].y,
      pinkyUp:  hand[20].y < hand[17].y,
    };
  }
  function palmNearMouth(hand) {
    if (!mouth) return false;
    const palmY = (hand[0].y + hand[9].y) / 2;
    const palmX = (hand[0].x + hand[9].x) / 2;
    return Math.abs(palmY - mouth.y) < 0.18 && Math.abs(palmX - 0.5) < 0.38;
  }
  function wristAtNeck(hand) {
    if (!chin) return false;
    return hand[0].y > chin.y && hand[0].y < chin.y + 0.28 && Math.abs(hand[0].x - 0.5) < 0.40;
  }

  for (const hand of hands) {
    const f = fingers(hand);
    if (f.indexUp && f.pinkyUp && !f.middleUp && !f.ringUp) return 'metal';
  }
  for (const hand of hands) {
    const wristAboveFingers = hand[0].y < hand[8].y && hand[0].y < hand[12].y;
    if (wristAboveFingers) return 'upsidedownpeace';
  }
  if (mouth) {
    for (const hand of hands) {
      const f = fingers(hand);
      const tipNearMouth = Math.abs(hand[8].x - mouth.x) < 0.16 && Math.abs(hand[8].y - mouth.y) < 0.20;
      if (f.indexUp && !f.middleUp && !f.ringUp && !f.pinkyUp && tipNearMouth) return 'indexfinger';
    }
  }
  if (hands.length >= 2 && hands.filter(h => wristAtNeck(h)).length >= 2) return 'dies';
  for (const hand of hands) {
    if (!fingers(hand).indexUp && !fingers(hand).middleUp && palmNearMouth(hand)) return 'shocked';
  }
  for (const hand of hands) {
    if (palmNearMouth(hand) && hands.length === 1) return 'shocked';
  }
  return 'neutral';
}

// ── UPDATE MEME ──────────────────────────────
function updateMeme(gesture) {
  const exprTag = document.getElementById('expr-tag');
  const memeImg = document.getElementById('meme-img');
  const memePlaceholder = document.getElementById('meme-display');
  const meme = MEMES[gesture];

  exprTag.style.display = 'block';
  exprTag.textContent   = meme.label;
  setStatus('detected', 'Detected: ' + meme.label);

  if (gesture !== lastGesture) {
    lastGesture = gesture;
    if (gesture === 'neutral') {
      memeImg.style.display = 'none';
      memePlaceholder.style.display = 'flex';
    } else {
      memePlaceholder.style.display = 'none';
      memeImg.style.display = 'block';
      memeImg.src = meme.src;
      memeImg.alt = meme.label;
      memeImg.style.animation = 'none';
      void memeImg.offsetWidth;
      memeImg.style.animation = '';
    }
  }
}

// ── DRAW OVERLAYS ────────────────────────────
function drawFaceBox(landmarks) {
  const xs = landmarks.map(l => (1-l.x)*overlay.width);
  const ys = landmarks.map(l => l.y*overlay.height);
  const minX=Math.min(...xs)-10, maxX=Math.max(...xs)+10;
  const minY=Math.min(...ys)-10, maxY=Math.max(...ys)+10;
  const cs=12;
  ctx.strokeStyle='rgba(232,65,58,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(minX+cs,minY); ctx.lineTo(minX,minY); ctx.lineTo(minX,minY+cs);
  ctx.moveTo(maxX-cs,minY); ctx.lineTo(maxX,minY); ctx.lineTo(maxX,minY+cs);
  ctx.moveTo(minX,maxY-cs); ctx.lineTo(minX,maxY); ctx.lineTo(minX+cs,maxY);
  ctx.moveTo(maxX-cs,maxY); ctx.lineTo(maxX,maxY); ctx.lineTo(maxX,maxY-cs);
  ctx.stroke();
}

function drawHandDots(landmarks) {
  const conn=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  ctx.strokeStyle='rgba(232,65,58,0.4)'; ctx.lineWidth=1;
  conn.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo((1-landmarks[a].x)*overlay.width,landmarks[a].y*overlay.height);
    ctx.lineTo((1-landmarks[b].x)*overlay.width,landmarks[b].y*overlay.height);
    ctx.stroke();
  });
  [4,8,12,16,20].forEach(i=>{
    ctx.fillStyle='rgba(232,65,58,0.8)';
    ctx.beginPath();
    ctx.arc((1-landmarks[i].x)*overlay.width,landmarks[i].y*overlay.height,3,0,Math.PI*2);
    ctx.fill();
  });
}
